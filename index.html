<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JR AI - Network Performance Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e293b;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #38bdf8;
        }
        .metric-box {
            background-color: #334155;
            padding: 1.25rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .label {
            font-size: 0.875rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .value {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 0.5rem;
            color: #f1f5f9;
        }
        button {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            margin-top: 1rem;
        }
        button:hover {
            background-color: #7dd3fc;
        }
        button:disabled {
            background-color: #64748b;
            cursor: not-allowed;
        }
        .note {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 1rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>JR AI Network Tester</h1>
    
    <div class="metric-box">
        <div class="label">Real Delay (Latency)</div>
        <div id="latency-val" class="value">-- ms</div>
    </div>

    <div class="metric-box">
        <div class="label">Download Speed</div>
        <div id="speed-val" class="value">-- Mbps</div>
    </div>

    <button id="test-btn" onclick="runNetworkTest()">Run Test</button>
    
    <p class="note">
        * Note: Ensure CORS is enabled on <code>666jrmusic.ccwu.cc</code> for accurate speed testing. Replace the speed test path with a real file on your server.
    </p>
</div>

<script>
const TARGET_HOST = 'https://666jrmusic.ccwu.cc';
// Replace this with a real file path on your server (e.g., '/assets/test.mp3' or '/img/banner.jpg')
const SPEED_TEST_FILE = '/favicon.ico'; 

async function testLatency() {
    const startTime = performance.now();
    try {
        // Cache busting token guarantees the request hits the server instead of local cache
        await fetch(`${TARGET_HOST}?cb=${Date.now()}`, { mode: 'no-cors', cache: 'no-store' });
        const endTime = performance.now();
        return Math.round(endTime - startTime);
    } catch (error) {
        console.error("Latency test failed:", error);
        return null;
    }
}

async function testSpeed() {
    const startTime = performance.now();
    try {
        const response = await fetch(`${TARGET_HOST}${SPEED_TEST_FILE}?cb=${Date.now()}`, { cache: 'no-store' });
        if (!response.ok) throw new Error("File not found or CORS issue");
        
        const blob = await response.blob();
        const endTime = performance.now();
        
        const durationInSeconds = (endTime - startTime) / 1000;
        const fileSizeInBits = blob.size * 8;
        const speedBps = fileSizeInBits / durationInSeconds;
        const speedMbps = speedBps / (1024 * 1024);
        
        return speedMbps.toFixed(2);
    } catch (error) {
        console.error("Speed test failed:", error);
        return "Error";
    }
}

async function runNetworkTest() {
    const btn = document.getElementById('test-btn');
    const latencyDisplay = document.getElementById('latency-val');
    const speedDisplay = document.getElementById('speed-val');
    
    btn.disabled = true;
    btn.innerText = "Testing...";
    latencyDisplay.innerText = "Measuring...";
    speedDisplay.innerText = "Measuring...";

    // 1. Run Latency Test
    const latency = await testLatency();
    if (latency !== null) {
        latencyDisplay.innerText = `${latency} ms`;
    } else {
        latencyDisplay.innerText = "Failed";
    }

    // 2. Run Speed Test
    const speed = await testSpeed();
    if (speed === "Error") {
        speedDisplay.innerText = "N/A*";
    } else {
        speedDisplay.innerText = `${speed} Mbps`;
    }

    btn.disabled = false;
    btn.innerText = "Run Test";
}
</script>

</body>
</html>
